<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lessons — First Down Academy</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="stylesheet" href="style.css?v=2">
<style>
/* ══ LESSON DARK SKIN — matches the FDA app theme ══
   Page-scoped overrides for the classes the lesson engine emits.
   style.css stays untouched for any page still using light mode. */
:root{ --L-bg:#020f1e; --L-bg2:#051526; --L-card:#0a1f36; --L-card2:#0e2740;
  --L-lime:#C1FF22; --L-border:rgba(193,255,34,.14); --L-line:rgba(255,255,255,.08);
  --L-text:#e8eef4; --L-muted:#93a4b5; --L-muted2:#5f7386; --L-red:#e05252; }
body{ background:var(--L-bg); }

/* Overview */
.module-overview{ color:var(--L-text); }
.overview-chip{ background:var(--L-card); border:1px solid var(--L-border); color:var(--L-lime); }
.overview-desc{ color:var(--L-muted); }
.overview-lessons{ background:transparent; }
.overview-lesson-item{ background:var(--L-bg2); border:1px solid var(--L-line); box-shadow:none; }
.overview-lesson-num{ background:var(--L-card); color:var(--L-lime); border:1px solid var(--L-border); }
.overview-lesson-title{ color:#fff; }
.overview-lesson-count{ color:var(--L-muted2); }
.overview-meta{ color:var(--L-muted2); }

/* Slides */
.slide-card{ background:var(--L-bg2); border:1px solid var(--L-line); box-shadow:0 14px 40px rgba(0,0,0,.35); }
.slide-heading{ color:#fff; }
.slide-body{ color:#c3cfda; }
.slide-body strong{ color:#fff; }
.slide-lesson-banner{ background:var(--L-card); border:1px solid var(--L-border); color:var(--L-text); }
.slide-lesson-chip{ background:rgba(193,255,34,.1); color:var(--L-lime); border:1px solid var(--L-border); }
.slide-lesson-name{ color:#fff; }
.slide-lesson-pos, .slide-lesson-label{ color:var(--L-muted2); }
.slide-dot{ background:var(--L-card2); }
.slide-dot.active{ background:var(--L-lime); }
.slide-dot.done{ background:rgba(193,255,34,.45); }
.slide-dot-sep{ color:var(--L-muted2); }
.slide-btn-back{ background:transparent; border:1px solid var(--L-line); color:var(--L-muted); }
.slide-btn-back:hover{ border-color:var(--L-lime); color:var(--L-lime); }
.slide-btn-next{ background:var(--L-card); color:var(--L-text); border:1px solid var(--L-line); }
.slide-btn-next.primary, .btn.btn-primary{ background:var(--L-lime); color:#06100a; border-color:var(--L-lime); }
.btn.btn-ghost{ background:transparent; border:1px solid var(--L-line); color:var(--L-muted); }
.btn.btn-ghost:hover{ border-color:var(--L-lime); color:var(--L-lime); }

/* Lesson intro */
.lesson-intro-card{ background:var(--L-bg2); border:1px solid var(--L-border); box-shadow:none; }
.lesson-intro-eyebrow{ color:var(--L-lime); }
.lesson-intro-title{ color:#fff; }
.lesson-intro-slides{ color:var(--L-muted2); }
.lesson-intro-preview-item{ color:var(--L-muted); }
.lesson-intro-preview-dot{ background:var(--L-lime); }

/* Progress */
.lesson-progress-bar{ background:var(--L-card); }
.lesson-progress-fill{ background:var(--L-lime); }
.lesson-progress-label, .lesson-module-label{ color:var(--L-muted2); }

/* Quiz */
.module-quiz-header{ border-color:var(--L-line); }
.module-quiz-title, .module-quiz-q{ color:#fff; }
.module-quiz-sub{ color:var(--L-muted); }
.module-quiz-num{ background:var(--L-card); color:var(--L-lime); border:1px solid var(--L-border); }
.module-quiz-section{ background:var(--L-bg2); border:1px solid var(--L-line); box-shadow:none; }
.lesson-quiz-q{ color:#fff; }
.lesson-quiz-opt{ background:var(--L-card); border:1.5px solid var(--L-line); color:var(--L-text); }
.lesson-quiz-opt:hover{ border-color:rgba(193,255,34,.45); background:var(--L-card2); }
.lesson-opt-letter{ background:var(--L-bg); color:var(--L-lime); border:1px solid var(--L-border); }
.lesson-quiz-opt.correct{ border-color:var(--L-lime); background:rgba(193,255,34,.1); color:#fff; }
.lesson-quiz-opt.wrong{ border-color:var(--L-red); background:rgba(224,82,82,.1); color:#fff; }
.lesson-quiz-result.correct{ background:rgba(193,255,34,.08); border:1.5px solid rgba(193,255,34,.3); color:var(--L-lime); }
.lesson-quiz-result.wrong{ background:rgba(224,82,82,.08); border:1.5px solid rgba(224,82,82,.35); color:#f28b8b; }

/* Completion */
.lesson-complete-section{ background:var(--L-bg2); border:1px solid var(--L-border); box-shadow:none; }
.lesson-complete-title{ color:#fff; }
.lesson-complete-sub{ color:var(--L-muted); }
.lesson-complete-icon{ filter:none; }
.lesson-module-complete-badge{ background:rgba(193,255,34,.1); color:var(--L-lime); border:1px solid var(--L-border); }
</style>
</head>
<body>

<div style="padding-top:0;min-height:100vh;background:#020f1e;">

  <!-- Lesson header bar -->
  <div style="background:var(--navy);padding:16px 0;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:50;">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
        <a href="dashboard.html" style="font-family:var(--font-m);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.6);text-decoration:none;display:flex;align-items:center;gap:6px;">&#8592; Dashboard</a>
        <div id="lessonHeader" style="flex:1;text-align:center;"></div>
        <a href="https://firstdownacademy.com/program.html" style="font-family:var(--font-m);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.6);text-decoration:none;">Curriculum</a>
      </div>
    </div>
  </div>

  <!-- Lesson body -->
  <div class="container" style="max-width:680px;padding:40px 24px 80px;">
    <div id="lessonBody">
      <div style="text-align:center;padding:80px 0;">
        <div style="font-size:40px;margin-bottom:16px;">&#127944;</div>
        <div style="font-family:var(--font-d);font-size:24px;color:var(--navy);">Loading lesson...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="curriculum.js?v=6"></script>
<script src="app.js?v=6"></script>
<script>
// Page-specific navigation — no SPA showPage needed
function showPage(name) {
  var map = {
    'home':'index.html', 'course':'program.html', 'giq':'giq.html',
    'levels':'levels.html', 'coaches':'coaches.html', 'signup':'auth.html',
    'dashboard':'dashboard.html', 'lesson':'lesson.html', 'legal':'legal.html'
  };
  if (map[name]) window.location.href = map[name];
}

function updateNavForLoggedIn() {
  // No nav changes needed on lesson page
}

function buildModuleList() {
  // Not needed on lesson page — prevents crash
}

function loadDashboard() {
  // Not needed on lesson page — prevents crash
}

// Wait for session, then render the lesson
document.addEventListener('sessionReady', function() {
  if (!currentUser) {
    window.location.href = 'auth.html';
    return;
  }
  // Get module index from sessionStorage
  var savedModule = sessionStorage.getItem('openModule');
  var moduleIdx = savedModule !== null ? parseInt(savedModule) : 0;
  sessionStorage.removeItem('openModule');

  // Set state and render directly — do NOT call openModule()
  // which would trigger navigation again
  moduleState.moduleIdx = moduleIdx;
  moduleState.lessonIdx = 0;
  moduleState.slideIdx  = 0;
  moduleState.phase     = 'overview';
  moduleState.skipIntro = false;
  quizResponses = {};
  renderModule();
});
</script>
</body>
</html>
