<script>
// Page-specific navigation — no SPA showPage needed
function showPage(name) {
  var map = {
    'home':'index.html', 'course':'program.html', 'giq':'giq.html',
    'levels':'levels.html', 'coaches':'coaches.html', 'signup':'auth.html',
    'dashboard':'dashboard.html', 'lesson':'lesson.html', 'legal':'legal.html'
  };
  if (map[name]) window.location.href = map[name];
}

function updateNavForLoggedIn() {
  // No nav changes needed on lesson page
}

function buildModuleList() {
  // Not needed on lesson page — prevents crash
}

function loadDashboard() {
  // Not needed on lesson page — prevents crash
}

// Wait for session, then render the lesson
document.addEventListener('sessionReady', function() {
  if (!currentUser) {
    window.location.href = 'auth.html';
    return;
  }
  // Get module index from sessionStorage
  var savedModule = sessionStorage.getItem('openModule');
  var moduleIdx = savedModule !== null ? parseInt(savedModule) : 0;
  sessionStorage.removeItem('openModule');

  // Set state and render directly — do NOT call openModule()
  // which would trigger navigation again
  moduleState.moduleIdx = moduleIdx;
  moduleState.lessonIdx = 0;
  moduleState.slideIdx  = 0;
  moduleState.phase     = 'overview';
  moduleState.skipIntro = false;
  quizResponses = {};
  renderModule();
});
</script>
